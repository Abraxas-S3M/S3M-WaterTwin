# S3M-WaterTwin - production-grade single-command stack.
#
#   docker compose up --build
#
# Brings up the whole advisory digital-twin stack, persistently:
#
#   timescaledb    persistent store (TimescaleDB / PostgreSQL 16)
#   hydraulic-sim  read-only EPANET/WNTR hydraulic what-if service
#   treatment-sim  read-only WaterTAP/IDAES RO process-simulation service
#   watertwin-api  Simulation Center orchestration, recommendations, reports;
#                  persists audit + recommendations to TimescaleDB
#   edge-gateway   outbound-only, read-only OT edge collector; reads the OT feed,
#                  validates + buffers (encrypted store-and-forward), and PUSHES
#                  canonical telemetry to the watertwin-api ingest endpoint
#   dashboard      operator Simulation Center UI (nginx), proxies /api -> api
#
# Everything is advisory / read-only with respect to plant control: every
# response carries the control boundary (control_write_enabled=false) and all
# simulation output is provenance-tagged (simulated / preliminary).
#
# Commercial-hardening #1 adds identity + RBAC: a Keycloak instance seeds the
# "watertwin" dev realm (roles viewer/operator/engineer/admin/auditor and one
# dev user per role). The API enforces Keycloak-issued JWTs by default and the
# dashboard logs in via OIDC. See docs/security/identity.md.
#
# The persistent store is a spatially-enabled TimescaleDB (timescaledb-ha, which
# bundles PostGIS). It backs the audit + recommendation tables and the geospatial
# network twin (network_element with a geometry(4326) column). watertwin-api
# degrades gracefully to an in-memory / GeoJSON twin when PostGIS is unavailable.

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: watertwin-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      # Dev master-realm admin (Keycloak console at http://localhost:8180).
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      # Stable issuer so JWT `iss` matches what browser + API expect.
      KC_HOSTNAME: http://localhost:8180
    ports:
      - "8180:8080"
    volumes:
      - ./infrastructure/keycloak/watertwin-realm.json:/opt/keycloak/data/import/watertwin-realm.json:ro
    restart: unless-stopped

  nats:
    # Advisory service-event bus. Carries notification-only events
    # (telemetry-ingested, alert-raised, workorder-created, config-published,
    # audit-appended) between services. It NEVER carries a control command --
    # the publisher guards every subject (see packages/watertwin_events). If this
    # service is down the API degrades gracefully to direct in-process delivery.
    image: nats:2.10-alpine
    container_name: watertwin-nats
    command: ["-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  timescaledb:
    # timescaledb-ha bundles both TimescaleDB and PostGIS, so the same store
    # serves the audit/recommendation tables and the geospatial network twin.
    image: timescale/timescaledb-ha:pg16
    container_name: watertwin-timescaledb
    environment:
      POSTGRES_USER: watertwin
      POSTGRES_PASSWORD: watertwin
      POSTGRES_DB: watertwin
    ports:
      - "5432:5432"
    volumes:
      # timescaledb-ha stores its cluster under /home/postgres/pgdata.
      - timescale_data:/home/postgres/pgdata
      - ./infrastructure/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watertwin -d watertwin"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  hydraulic-sim:
    build:
      context: .
      dockerfile: services/hydraulic-sim/Dockerfile
    image: s3m-watertwin/hydraulic-sim:latest
    container_name: watertwin-hydraulic-sim
    ports:
      - "8100:8100"
    environment:
      HYDRAULIC_SIM_JOB_STORE: /data/jobs.json
      HYDRAULIC_SIM_CONTROL_MODE: advisory
    volumes:
      - hydraulic_sim_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  treatment-sim:
    build:
      context: .
      dockerfile: services/treatment-sim/Dockerfile
    image: s3m-watertwin/treatment-sim:latest
    container_name: watertwin-treatment-sim
    ports:
      - "8081:8080"
    environment:
      TREATMENT_SIM_PORT: "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  watertwin-api:
    build:
      context: .
      dockerfile: services/watertwin-api/Dockerfile
    image: s3m-watertwin/watertwin-api:latest
    container_name: watertwin-api
    ports:
      - "8000:8000"
    environment:
      HYDRAULIC_SIM_URL: http://hydraulic-sim:8100
      TREATMENT_SIM_URL: http://treatment-sim:8080
      WATERTWIN_DATABASE_URL: postgresql://watertwin:watertwin@timescaledb:5432/watertwin
      # Advisory service-event bus. Unset this to run without NATS: the API then
      # degrades gracefully to direct in-process delivery (log + metric).
      NATS_URL: nats://nats:4222
      WATERTWIN_RECO_STORE: /data/recommendations.json
      WATERTWIN_CORS_ORIGINS: "*"
      # Deployment profile: standard | one_way_diode. In one_way_diode the
      # platform never initiates a connection toward OT (fail-closed at startup).
      # See docs/deployment/edge-xiid-reference.md.
      DEPLOYMENT_PROFILE: ${DEPLOYMENT_PROFILE:-standard}
      # Identity + RBAC: enforce Keycloak-issued JWTs by default. The issuer is
      # the browser-facing URL (token `iss`); JWKS is fetched over the internal
      # docker network. Flip WATERTWIN_AUTH_DISABLED=true only for local dev.
      WATERTWIN_AUTH_DISABLED: "false"
      WATERTWIN_OIDC_ISSUER: http://localhost:8180/realms/watertwin
      WATERTWIN_OIDC_JWKS_URI: http://keycloak:8080/realms/watertwin/protocol/openid-connect/certs
      # Provisioned ingest token the edge-gateway presents (X-Ingest-Token) to
      # the telemetry ingest path. Set WATERTWIN_INGEST_TOKEN in your .env
      # (see .env.example). When empty, ingest falls back to role-based auth, so
      # under enforced auth the gateway needs this set to forward telemetry.
      WATERTWIN_INGEST_TOKEN: ${WATERTWIN_INGEST_TOKEN:-}
    volumes:
      - watertwin_api_data:/data
    depends_on:
      timescaledb:
        condition: service_healthy
      hydraulic-sim:
        condition: service_healthy
      keycloak:
        condition: service_started
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability stack: Prometheus scrapes each service's /metrics endpoint and
  # Grafana renders the provisioned WaterTwin dashboard. Both are read-only
  # observers; neither talks to a control system. See
  # docs/architecture/observability.md.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: watertwin-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      watertwin-api:
        condition: service_started
      hydraulic-sim:
        condition: service_started
      treatment-sim:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: watertwin-grafana
    environment:
      # Dev credentials only; override in any real deployment.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
  edge-gateway:
    build:
      context: .
      dockerfile: services/edge-gateway/Dockerfile
    image: s3m-watertwin/edge-gateway:latest
    container_name: watertwin-edge-gateway
    # OUTBOUND-ONLY: no `ports:` mapping and no inbound listener. The gateway's
    # only network path is the outbound push to the watertwin-api ingest
    # endpoint on the internal network.
    environment:
      EDGE_GATEWAY_ID: edge-gw-01
      EDGE_GATEWAY_API_URL: http://watertwin-api:8000
      EDGE_GATEWAY_INGEST_PATH: /api/v1/ingestion/telemetry
      # Bearer token presented to the API (set to a real service credential in
      # production). Left blank here since the dev API bypass accepts it.
      EDGE_GATEWAY_API_TOKEN: ""
      # Stable passphrase for the encrypted store-and-forward buffer. CHANGE ME
      # in production and keep it stable so the buffer survives restarts.
      EDGE_GATEWAY_BUFFER_KEY: change-me-edge-buffer-passphrase
      EDGE_GATEWAY_BUFFER_PATH: /data/edge-buffer.db
      EDGE_GATEWAY_HEARTBEAT_PATH: /data/edge-gateway.heartbeat
      EDGE_GATEWAY_POLL_INTERVAL_S: "5"
      # Read-only OT source selection (defaults to the synthetic plant; point at
      # a real OPC UA / Modbus / historian feed via the same OT_* vars as the API).
      OT_SOURCE: synthetic
    volumes:
      - edge_gateway_data:/data
    depends_on:
      watertwin-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "8200:8200"
    environment:
      EDGE_GATEWAY_ID: edge-gw-01
      EDGE_API_URL: http://watertwin-api:8000
      EDGE_SPOOL_DIR: /data/spool
      EDGE_BATCH_INTERVAL_S: "1.0"
      # Must match watertwin-api's WATERTWIN_INGEST_TOKEN so the gateway can
      # forward under enforced auth. When empty and the API runs with auth
      # disabled, ingest is still accepted (dev / chaos drill).
      EDGE_INGEST_TOKEN: ${WATERTWIN_INGEST_TOKEN:-}
    volumes:
      - edge_gateway_spool:/data
    depends_on:
      # service_started (not service_healthy): the gateway must be able to run
      # and spool telemetry even while the API is down (store-and-forward).
      watertwin-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8200/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # watertwin-ingest: OPTIONAL immutable customer-file intake (receive, store,
  # scan, track). It has NO direct database connection to the canonical store --
  # it talks to watertwin-api over the same authenticated HTTP API a human uses
  # -- and NO OT network access (it cannot reach MQTT / OPC UA / the edge
  # gateway). Nothing else depends on it: with this container stopped the whole
  # platform still works. Under DEPLOYMENT_PROFILE=one_way_diode it starts and
  # serves /health but returns 503 on every ingest route.
  # ---------------------------------------------------------------------------
  watertwin-ingest:
    build:
      context: .
      dockerfile: services/watertwin-ingest/Dockerfile
    image: s3m-watertwin/watertwin-ingest:latest
    container_name: watertwin-ingest
    ports:
      - "8300:8300"
    environment:
      # Immutable, write-once content store (local filesystem backend).
      INGEST_STORAGE_BACKEND: local
      INGEST_STORAGE_ROOT: /data/ingest
      # Talk to watertwin-api over HTTP (audit append). No direct DB access.
      INGEST_API_URL: http://watertwin-api:8000
      INGEST_API_TOKEN: ${WATERTWIN_INGEST_TOKEN:-}
      # Advisory service-event bus (ingest.received / .scanned / .failed). Unset
      # NATS_URL to run without NATS (degrades to direct in-process delivery).
      NATS_URL: nats://nats:4222
      # Disabled entirely under a one-way / data-diode profile (fail-closed).
      DEPLOYMENT_PROFILE: ${DEPLOYMENT_PROFILE:-standard}
      # Identity + RBAC: reuse the same Keycloak realm/JWTs as watertwin-api.
      WATERTWIN_AUTH_DISABLED: "false"
      WATERTWIN_OIDC_ISSUER: http://localhost:8180/realms/watertwin
      WATERTWIN_OIDC_JWKS_URI: http://keycloak:8080/realms/watertwin/protocol/openid-connect/certs
    volumes:
      - ingest_data:/data
    depends_on:
      # service_started (not service_healthy): the ingest service is optional and
      # independent; it must run even while the API is unavailable.
      keycloak:
        condition: service_started
      nats:
        condition: service_started
      watertwin-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8300/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  dashboard:
    build:
      context: apps/dashboard
      dockerfile: Dockerfile
      args:
        # OIDC login config baked into the SPA build. Points the browser at the
        # host-exposed Keycloak and the seeded public dashboard client.
        VITE_KEYCLOAK_URL: http://localhost:8180
        VITE_KEYCLOAK_REALM: watertwin
        VITE_KEYCLOAK_CLIENT_ID: watertwin-dashboard
    image: s3m-watertwin/dashboard:latest
    container_name: watertwin-dashboard
    ports:
      - "8080:80"
    depends_on:
      watertwin-api:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  timescale_data:
  hydraulic_sim_data:
  watertwin_api_data:
  edge_gateway_data:
  prometheus_data:
  grafana_data:
  edge_gateway_spool:
  ingest_data:
