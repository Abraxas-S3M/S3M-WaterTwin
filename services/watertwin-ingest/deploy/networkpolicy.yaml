# Kubernetes NetworkPolicy for watertwin-ingest: DENY-ALL egress by default with
# a tiny explicit allowlist. This is the network-layer twin of the application
# egress guard in app/egress.py; security/tests assert the two agree.
#
# Intent:
#   * Parser workers must NOT reach the network except the S3M endpoint and the
#     watertwin-api endpoint. Everything else (data exfiltration) is denied.
#   * There is deliberately NO egress rule toward any OT CIDR, MQTT (1883/8883)
#     or OPC UA (4840) — so the ingest service cannot reach the OT network,
#     even via a bug.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: watertwin-ingest-deny-egress
  namespace: watertwin
  labels:
    app.kubernetes.io/name: watertwin-ingest
    app.kubernetes.io/part-of: s3m-watertwin
  annotations:
    watertwin.s3m/intent: >-
      Deny-all egress from ingest parser workers. Only DNS, the watertwin-api
      endpoint and the S3M endpoint are allowed. No route to the OT zone, MQTT
      or OPC UA exists (see docs/deployment/ingest-network-policy.md).
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: watertwin-ingest
  policyTypes:
    - Ingress
    - Egress

  # --- Ingress: only the dashboard / API gateway may reach the ingest API. ----
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: watertwin-dashboard
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: watertwin-api
      ports:
        - protocol: TCP
          port: 8300

  # --- Egress: explicit allowlist. NOTHING here routes into the OT zone. ------
  egress:
    # DNS resolution only.
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # watertwin-api (in-cluster advisory API) — the only platform egress target.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: watertwin-api
      ports:
        - protocol: TCP
          port: 8000
    # S3M endpoint (egress gateway to the S3M platform), HTTPS only. Restrict the
    # CIDR to the S3M egress gateway in your environment.
    - to:
        - ipBlock:
            cidr: 10.80.0.0/32
      ports:
        - protocol: TCP
          port: 443
  # There is deliberately NO egress entry for MQTT (1883/8883), OPC UA (4840),
  # Modbus (502) or any OT CIDR: omitting the rule denies it by default.
