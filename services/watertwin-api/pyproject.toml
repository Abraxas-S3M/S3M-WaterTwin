[project]
name = "watertwin-api"
version = "0.1.0"
description = "WaterTwin API service for a reverse-osmosis desalination digital twin."
requires-python = ">=3.11"

[tool.setuptools.packages.find]
include = ["watertwin*"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
