[project]
name = "watertwin-api"
version = "0.6.0"
description = "S3M-WaterTwin advisory digital-twin API service"
requires-python = ">=3.12"

[tool.setuptools.packages.find]
include = ["watertwin*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "W"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = false
disallow_untyped_defs = false
