server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the built React Simulation Center SPA (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + health to watertwin-api so the browser avoids CORS.
    location /api/ {
        proxy_pass http://watertwin-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://watertwin-api:8000/health;
        proxy_set_header Host $host;
    }
}
