# nginx reverse-proxy config for the watertwin-api ingestion endpoint under the
# one-way / data-diode (XiiD-ready) deployment profile.
#
# Role: this nginx sits in front of watertwin-api on the PLATFORM side and is the
# server-side termination of the edge gateway's OUTBOUND mTLS tunnel. The edge
# gateway (XOTC / Xiid mesh connector) is the CLIENT; it PUSHES telemetry here.
# This proxy never initiates a connection toward the OT zone.
#
# Expectations expressed here:
#   * mTLS: the client (edge gateway) MUST present a certificate signed by the
#     gateway CA; unauthenticated peers are rejected (ssl_verify_client on).
#   * Outbound-only / push-only: only the telemetry ingestion path is exposed to
#     the tunnel. There is no upstream toward OT and no proxy_pass into an OT
#     network -- this box has no route into the OT zone.
#   * Process-to-process: one client identity -> one upstream process.
#
# NOTE: WaterTwin does NOT reimplement Xiid ZKN crypto. The ZKN/SealedTunnel
# transport is handled by the Xiid connector; this config layers ordinary mTLS +
# an ingestion-only surface on top. See docs/deployment/edge-xiid-reference.md.

# Upstream is the local watertwin-api process ONLY (platform side).
upstream watertwin_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 8443 ssl;
    http2 on;
    server_name watertwin-ingest.internal;

    # --- Server identity (platform side) -----------------------------------
    ssl_certificate     /etc/nginx/tls/server.crt;
    ssl_certificate_key /etc/nginx/tls/server.key;
    ssl_protocols       TLSv1.3 TLSv1.2;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Mutual TLS: the edge gateway MUST authenticate as a client ---------
    # Only certificates signed by the edge-gateway CA are accepted; anonymous or
    # unknown peers are refused. This is the authenticated conduit crossing the
    # OT zone boundary.
    ssl_client_certificate /etc/nginx/tls/gateway-ca.crt;
    ssl_verify_client      on;
    ssl_verify_depth       2;

    # Fail-closed: reject any request whose client certificate did not verify.
    if ($ssl_client_verify != SUCCESS) {
        return 496;  # nginx: "No required SSL certificate was sent"
    }

    # --- Push-only ingestion surface ---------------------------------------
    # The tunnel may reach ONLY the telemetry ingestion endpoint. Everything
    # else is denied, so the conduit is process-to-process and push-only.
    location = /api/v1/ingestion/telemetry {
        limit_except POST {
            deny all;   # push-only: no GET/PUT/DELETE from the OT side
        }
        proxy_pass http://watertwin_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # Forward the verified gateway identity for audit/RBAC on the app side.
        proxy_set_header X-Client-DN       $ssl_client_s_dn;
        proxy_set_header X-Client-Verify   $ssl_client_verify;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Health of the ingestion front door (no OT reachability implied).
    location = /health {
        proxy_pass http://watertwin_api;
    }

    # Default-deny: any other path over the tunnel is refused.
    location / {
        return 403;
    }
}

# There is intentionally NO server block or upstream that connects INTO the OT
# zone. This proxy is a pure inbound-terminator for the gateway's outbound tunnel;
# the platform never originates a request toward OT (one_way_diode).
