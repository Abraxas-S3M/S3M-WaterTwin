# nginx config for the OT-side EDGE GATEWAY under the one-way / data-diode
# (XiiD-ready) deployment profile.
#
# Role: this runs inside the OT zone edge (Purdue L3/L3.5). A local, read-only
# collector process hands off telemetry on loopback; this gateway forwards it
# OUTBOUND to the platform ingestion endpoint over an mTLS client connection
# (which itself rides inside the Xiid SealedTunnel / XOTC transport).
#
# The two properties this config demonstrates:
#   * OUTBOUND-ONLY: the only listener is bound to 127.0.0.1 (the local collector
#     on the OT edge host). Nothing listens on a routable interface, so the
#     platform has no inbound port to connect to and the OT zone exposes no
#     public IP / no inbound ports.
#   * mTLS as CLIENT: when forwarding to the platform the gateway presents its
#     client certificate and verifies the platform's server certificate
#     (proxy_ssl_* below). Push-only: only POSTs to the ingestion path go out.
#
# NOTE: Xiid ZKN crypto / SealedTunnel transport is NOT reimplemented here. This
# config assumes the Xiid connector provides the tunnel; nginx expresses the
# outbound-only + mTLS posture on top. See docs/deployment/edge-xiid-reference.md.

# The platform ingestion endpoint reached via the outbound tunnel. In a XiiD
# deployment this hostname resolves to the local end of the SealedTunnel/XOTC.
upstream platform_ingest {
    server platform-ingest.tunnel.local:8443;
    keepalive 8;
}

server {
    # OUTBOUND-ONLY: bind to loopback only. No routable/inbound listener exists,
    # so neither the platform nor anything off-host can initiate a connection in.
    listen 127.0.0.1:8080;
    server_name localhost;

    # Local read-only collector pushes normalized telemetry here; we forward it
    # outbound to the platform. Push-only: reject anything but POST.
    location = /push/telemetry {
        limit_except POST {
            deny all;
        }
        proxy_pass https://platform_ingest/api/v1/ingestion/telemetry;

        # --- mTLS as CLIENT toward the platform ----------------------------
        proxy_ssl_certificate         /etc/nginx/tls/gateway-client.crt;
        proxy_ssl_certificate_key     /etc/nginx/tls/gateway-client.key;
        proxy_ssl_trusted_certificate /etc/nginx/tls/platform-ca.crt;
        proxy_ssl_verify              on;
        proxy_ssl_verify_depth        2;
        proxy_ssl_protocols           TLSv1.3 TLSv1.2;
        proxy_ssl_server_name         on;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Everything else is denied: this gateway does exactly one thing (push out).
    location / {
        return 403;
    }
}

# There is intentionally NO listener on a routable interface and NO location that
# accepts a connection FROM the platform. The gateway only ever initiates
# outbound connections to the platform (gateway-push-only); the platform can
# never initiate a connection back into the OT zone.
