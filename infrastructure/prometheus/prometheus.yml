# Prometheus scrape configuration for the S3M-WaterTwin advisory stack.
#
# Each service exposes Prometheus metrics at GET /metrics (installed by the
# shared watertwin_observability package): HTTP request latency/throughput plus
# the domain gauges watertwin_ingest_lag_seconds, watertwin_buffer_depth,
# watertwin_model_drift_ratio and watertwin_audit_chain_length.
#
# Everything here is read-only observation; Prometheus never talks to a control
# system. Targets use the docker-compose service DNS names.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: s3m-watertwin

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: watertwin-api
    metrics_path: /metrics
    static_configs:
      - targets: ["watertwin-api:8000"]
        labels:
          service: watertwin-api

  - job_name: hydraulic-sim
    metrics_path: /metrics
    static_configs:
      - targets: ["hydraulic-sim:8100"]
        labels:
          service: hydraulic-sim

  - job_name: treatment-sim
    metrics_path: /metrics
    static_configs:
      - targets: ["treatment-sim:8080"]
        labels:
          service: treatment-sim
