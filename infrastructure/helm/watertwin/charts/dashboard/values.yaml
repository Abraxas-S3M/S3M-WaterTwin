# dashboard component defaults. Overridden per-env under `dashboard:`.
componentTier: ui

replicaCount: 1

image:
  registry: ""
  repository: s3m-watertwin/dashboard
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: dashboard

serviceAccount:
  create: true
  name: ""
  automount: false
  annotations: {}

automountServiceAccountToken: false

# nginx binds :80 and manages its own cache/run dirs, so we keep a writable
# rootfs but still drop privileges and disable escalation.
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

ports:
  - name: http
    containerPort: 80
    protocol: TCP

service:
  enabled: true
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http

env: {}
secretEnv: []
extraEnv: []
envFrom: []

volumes: []
volumeMounts: []

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 5

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  tls: []

networkPolicy:
  enabled: true
  allowDNS: true
  ingress:
    - from:
        - namespace: ingress-nginx
      ports:
        - port: 80
  egress:
    - to:
        - component: watertwin-api
      ports:
        - port: 8000
