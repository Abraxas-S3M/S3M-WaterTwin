# treatment-sim component defaults. Overridden per-env under `treatment-sim:`.
componentTier: sim

replicaCount: 1

image:
  registry: ""
  repository: s3m-watertwin/treatment-sim
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: treatment-sim

serviceAccount:
  create: true
  name: ""
  automount: false
  annotations: {}

automountServiceAccountToken: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

ports:
  - name: http
    containerPort: 8080
    protocol: TCP

service:
  enabled: true
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http

env:
  TREATMENT_SIM_PORT: "8080"

secretEnv: []
extraEnv: []
envFrom: []

# WaterTAP/IDAES + ipopt need scratch space; rootfs stays read-only.
volumes:
  - name: tmp
    emptyDir: {}
volumeMounts:
  - name: tmp
    mountPath: /tmp

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 40
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1536Mi

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  tls: []

networkPolicy:
  enabled: true
  allowDNS: true
  ingress:
    - from:
        - component: watertwin-api
      ports:
        - port: 8080
  egress: []
