# hydraulic-sim component defaults. Overridden per-env under `hydraulic-sim:`.
componentTier: sim

replicaCount: 1

image:
  registry: ""
  repository: s3m-watertwin/hydraulic-sim
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: hydraulic-sim

serviceAccount:
  create: true
  name: ""
  automount: false
  annotations: {}

automountServiceAccountToken: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

ports:
  - name: http
    containerPort: 8100
    protocol: TCP

service:
  enabled: true
  type: ClusterIP
  ports:
    - name: http
      port: 8100
      targetPort: http

env:
  HYDRAULIC_SIM_JOB_STORE: "/data/jobs.json"
  HYDRAULIC_SIM_CONTROL_MODE: "advisory"

secretEnv: []
extraEnv: []
envFrom: []

volumes:
  - name: data
    emptyDir: {}
volumeMounts:
  - name: data
    mountPath: /data

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  tls: []

# Internal simulation service: only the API may reach it; egress limited to DNS.
networkPolicy:
  enabled: true
  allowDNS: true
  ingress:
    - from:
        - component: watertwin-api
      ports:
        - port: 8100
  egress: []
