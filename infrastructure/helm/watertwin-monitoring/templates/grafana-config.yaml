{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "watertwin-monitoring.grafana.fullname" . }}-provisioning
  labels:
    {{- include "watertwin-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "watertwin-monitoring.prometheus.fullname" . }}:{{ .Values.prometheus.service.port }}
        isDefault: true
        editable: false
        jsonData:
          timeInterval: {{ .Values.prometheus.scrapeInterval }}
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: watertwin
        orgId: 1
        folder: WaterTwin
        type: file
        disableDeletion: false
        editable: true
        allowUiUpdates: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "watertwin-monitoring.grafana.fullname" . }}-dashboards
  labels:
    {{- include "watertwin-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
  {{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
