# CIDR-based egress allowlist for watertwin-api (one-way / data-diode profile).
#
# This is the explicit, human-auditable statement of "where the platform is
# allowed to send traffic" expressed as IP ranges rather than pod selectors. It
# is useful when the sims/DB/IdP live outside the cluster, or as a second,
# CIDR-level guard alongside the selector-based policy.
#
# The critical property: the OT zone CIDR(s) are listed under `except`, so egress
# to the OT zone is DENIED even though the surrounding enterprise range is
# allowed. Under DEPLOYMENT_PROFILE=one_way_diode the platform must never
# initiate a connection toward OT; this makes that explicit at the IP layer.
#
# Replace the example CIDRs with your real enterprise/cloud ranges and the real
# OT zone range(s). See docs/deployment/edge-xiid-reference.md.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: watertwin-api-egress-allowlist
  namespace: watertwin
  labels:
    app.kubernetes.io/name: watertwin-api
    app.kubernetes.io/part-of: s3m-watertwin
    watertwin.s3m/deployment-profile: one_way_diode
  annotations:
    watertwin.s3m/intent: >-
      Egress allowlist. Enterprise/cloud ranges are permitted; OT zone CIDRs are
      excluded so the platform cannot initiate a connection toward OT.
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: watertwin-api
  policyTypes:
    - Egress
  egress:
    # Allow DNS (kube-dns / CoreDNS).
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow the enterprise/cloud range EXCEPT the OT zone CIDRs.
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8            # example enterprise/cloud supernet
            except:
              - 10.20.0.0/16           # example OT zone (Purdue L0-L3) -- DENIED
              - 10.21.0.0/16           # example OT DMZ / historian -- DENIED
      ports:
        - protocol: TCP
          port: 5432                   # TimescaleDB / Postgres
        - protocol: TCP
          port: 8080                   # Keycloak (JWKS)
        - protocol: TCP
          port: 8100                   # hydraulic-sim
        - protocol: TCP
          port: 8200                   # treatment-sim
    # NOTE: there is intentionally no rule permitting OPC UA (4840), Modbus (502),
    # or historian REST/SQL toward the OT zone. Those are the platform->OT request
    # paths disabled by the one_way_diode profile.
