name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Safety boundary guard: the read-only posture is a build-breaking invariant.
  # If a control-write path is ever introduced, the build fails here.
  # ---------------------------------------------------------------------------
  boundary-guard:
    name: boundary-guard (read-only invariant)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if a control-write path exists
        run: |
          set -euo pipefail
          echo "Scanning services/ and packages/ for a control-write path..."
          if grep -RInE 'control_write_enabled[[:space:]]*=[[:space:]]*True' services packages; then
            echo "::error::A control-write path was detected (control_write_enabled = True)."
            echo "The platform is advisory-only; this invariant is build-breaking."
            exit 1
          fi
          echo "OK: no control-write path found. Read-only boundary intact."

  # ---------------------------------------------------------------------------
  # Build guard (BUILD GATE): the whole tree must compile and every service app
  # must import. This is the gate that makes a broken `main` impossible to merge:
  # a syntax error or an import-time failure in any package or service fails the
  # check on pull_request. Pair it with branch protection that requires status
  # checks to pass AND "require branches to be up to date before merging" so the
  # merge *result* is re-tested (see the PR description).
  # ---------------------------------------------------------------------------
  compile-guard:
    name: compile-guard (compileall packages + services)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Compiles every package + service, including the optional
      # services/watertwin-ingest intake service (covered by ``services``).
      - name: Compile every package and service (syntax gate)
        run: python -m compileall packages services

  import-guard:
    name: import-guard (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [watertwin-api, hydraulic-sim, treatment-sim, edge-gateway, watertwin-ingest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install service runtime
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          case "${{ matrix.service }}" in
            watertwin-api)
              pip install -r services/watertwin-api/requirements.txt
              ;;
            hydraulic-sim)
              pip install -r services/hydraulic-sim/requirements.txt
              ;;
            treatment-sim)
              # The analytical RO engine's light runtime (the WaterTAP/IDAES +
              # ipopt stack is confined to the container image).
              pip install fastapi "uvicorn[standard]" pydantic httpx numpy \
                prometheus-client opentelemetry-api opentelemetry-sdk \
                opentelemetry-exporter-otlp-proto-http \
                opentelemetry-instrumentation-fastapi
              ;;
            edge-gateway)
              pip install -r services/edge-gateway/requirements.txt
              ;;
            watertwin-ingest)
              pip install -r services/watertwin-ingest/requirements.txt
              ;;
          esac

      - name: Import the service app (fails on any import-time error)
        working-directory: services/${{ matrix.service }}
        env:
          PYTHONPATH: ${{ github.workspace }}/packages
          # edge-gateway creates its store-and-forward spool at import; point it
          # at a writable path so the import check does not need /data.
          EDGE_SPOOL_DIR: ${{ runner.temp }}/edge-spool
          # watertwin-ingest builds its local content store at import; point it
          # at a writable path so the import check does not need /data.
          INGEST_STORAGE_ROOT: ${{ runner.temp }}/ingest-store
        run: python -c "import app.main"

  # ---------------------------------------------------------------------------
  # Quality: lint + type-check + tests for every service.
  # ---------------------------------------------------------------------------
  quality:
    name: quality (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [watertwin-api, hydraulic-sim, treatment-sim, edge-gateway, watertwin-ingest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio
          case "${{ matrix.service }}" in
            watertwin-api)
              # Integration tests spin up a live hydraulic-sim, so install the
              # API deps plus WNTR/EPANET (unpinned, to avoid clashing with the
              # API's pinned fastapi/pydantic).
              pip install -r services/watertwin-api/requirements.txt
              pip install wntr
              ;;
            hydraulic-sim)
              pip install -r services/hydraulic-sim/requirements.txt
              ;;
            treatment-sim)
              # The treatment-sim test-suite exercises the analytical RO engine
              # (the WaterTAP/IDAES + ipopt stack is confined to the container
              # image). Install the light runtime the analytical path needs plus
              # the shared observability deps (Prometheus + OpenTelemetry).
              pip install fastapi "uvicorn[standard]" pydantic httpx numpy \
                prometheus-client opentelemetry-api opentelemetry-sdk \
                opentelemetry-exporter-otlp-proto-http \
                opentelemetry-instrumentation-fastapi
              ;;
            edge-gateway)
              # Outbound-only edge collector: reuses the shared read-only OT
              # sources (packages/ot_ingestion) + an encrypted store-and-forward
              # buffer. Install its pinned deps.
              pip install -r services/edge-gateway/requirements.txt
              ;;
            watertwin-ingest)
              # Optional immutable-intake service: no direct DB, no OT access.
              # Install its pinned deps (fastapi + multipart + httpx + event bus).
              pip install -r services/watertwin-ingest/requirements.txt
              ;;
          esac

      - name: Ruff (lint)
        working-directory: services/${{ matrix.service }}
        run: ruff check .

      - name: Mypy (type-check, non-blocking)
        continue-on-error: true
        working-directory: services/${{ matrix.service }}
        env:
          PYTHONPATH: ${{ github.workspace }}/packages
        run: mypy app

      - name: Pytest
        working-directory: services/${{ matrix.service }}
        env:
          # The suite points the write-once store at a throwaway dir (see the
          # test conftest); this default keeps import-time store creation off /data.
          INGEST_STORAGE_ROOT: ${{ runner.temp }}/ingest-store
        run: python -m pytest -q

  # ---------------------------------------------------------------------------
  # Shared physics + contract packages.
  # ---------------------------------------------------------------------------
  packages:
    name: packages (shared physics + contracts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          # scipy for the physics packages; prometheus-client + OpenTelemetry for
          # the shared watertwin_observability package and its tests.
          pip install pytest pydantic scipy==1.18.0 \
            prometheus-client opentelemetry-api opentelemetry-sdk \
            opentelemetry-exporter-otlp-proto-http \
            opentelemetry-instrumentation-fastapi

      - name: Pytest
        working-directory: packages
        run: python -m pytest -q

  # ---------------------------------------------------------------------------
  # Dashboard (React/TypeScript) unit tests.
  # ---------------------------------------------------------------------------
  dashboard:
    name: dashboard (React/TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: apps/dashboard
        run: npm ci

      - name: Test
        working-directory: apps/dashboard
        run: npm test

  # ---------------------------------------------------------------------------
  # Kubernetes packaging: lint the Helm charts and validate every rendered
  # manifest against the upstream Kubernetes JSON schemas (kubeconform). This
  # gates the infrastructure/helm charts across all three environments.
  # ---------------------------------------------------------------------------
  helm:
    name: helm (lint + kubeconform)
    runs-on: ubuntu-latest
    env:
      KUBECONFORM_VERSION: "0.7.0"
      KUBE_VERSION: "1.29.0"
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Install kubeconform
        run: |
          set -euxo pipefail
          curl -sSL -o /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo install /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Build chart dependencies
        run: ./infrastructure/helm/build-deps.sh

      - name: Helm lint (dev / staging / prod)
        run: |
          set -euxo pipefail
          for env in dev staging prod; do
            helm lint infrastructure/helm/watertwin \
              -f "infrastructure/helm/watertwin/values-${env}.yaml"
          done

      - name: Render + kubeconform (dev / staging / prod)
        run: |
          set -euo pipefail
          for env in dev staging prod; do
            echo "::group::kubeconform ${env}"
            helm template watertwin infrastructure/helm/watertwin \
              -n watertwin \
              -f "infrastructure/helm/watertwin/values-${env}.yaml" \
              | kubeconform \
                  -strict \
                  -summary \
                  -kubernetes-version "${KUBE_VERSION}" \
                  -schema-location default
            echo "::endgroup::"
          done

  # ---------------------------------------------------------------------------
  # Supply chain: generate CycloneDX SBOMs and reconcile them against the
  # open-source register. Reconciliation is a build gate: any direct dependency
  # missing from docs/licensing/open-source-register.md fails the build.
  # ---------------------------------------------------------------------------
  sbom:
    name: sbom + reconcile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install SBOM tools + pytest
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install cyclonedx-bom pytest

      - name: Generate CycloneDX SBOMs (Python)
        run: |
          set -euxo pipefail
          mkdir -p docs/licensing/sbom
          for svc in watertwin-api hydraulic-sim treatment-sim edge-gateway; do
            python -m cyclonedx_py requirements "services/$svc/requirements.txt" \
              -o "docs/licensing/sbom/sbom-$svc.cdx.json"
          done

      - name: Generate CycloneDX SBOM (dashboard / npm)
        working-directory: apps/dashboard
        run: |
          set -euxo pipefail
          npx --yes @cyclonedx/cyclonedx-npm@latest --package-lock-only \
            --output-format JSON \
            --output-file ../../docs/licensing/sbom/sbom-dashboard.cdx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: docs/licensing/sbom/*.cdx.json

      - name: Reconcile tool unit tests
        run: python -m pytest scripts/tests -q

      - name: Reconcile SBOMs against the open-source register (gate)
        run: python scripts/reconcile_sbom.py

  # ---------------------------------------------------------------------------
  # Dependency vulnerability scan (BUILD GATE).
  # pip-audit for the Python services + npm audit for the dashboard. Findings
  # fail the build; accepted advisories are documented in security/*-ignore.txt
  # (see docs/security/accepted-advisories.md).
  # ---------------------------------------------------------------------------
  vuln-scan:
    name: vuln-scan (pip-audit + npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install pip-audit
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: pip-audit (Python services, gated)
        run: |
          set -euo pipefail
          # Build --ignore-vuln args from the documented accepted-advisory file.
          ignore_args=()
          if [[ -f security/pip-audit-ignore.txt ]]; then
            while IFS= read -r line; do
              line="${line%%#*}"; line="$(echo "$line" | xargs || true)"
              [[ -n "$line" ]] && ignore_args+=("--ignore-vuln" "$line")
            done < security/pip-audit-ignore.txt
          fi
          status=0
          for svc in watertwin-api hydraulic-sim treatment-sim edge-gateway; do
            echo "::group::pip-audit $svc"
            pip-audit -r "services/$svc/requirements.txt" "${ignore_args[@]}" || status=1
            echo "::endgroup::"
          done
          if [[ "$status" -ne 0 ]]; then
            echo "::error::pip-audit found unaccepted vulnerabilities."
            exit 1
          fi

      - name: npm audit (dashboard, gated)
        working-directory: apps/dashboard
        run: |
          set -euo pipefail
          npm audit --json > npm-audit.json || true
          python ../../scripts/npm_audit_gate.py \
            --input npm-audit.json \
            --ignore-file ../../security/npm-audit-ignore.txt \
            --min-severity high

  # ---------------------------------------------------------------------------
  # Secret scan (BUILD GATE) via gitleaks. Any finding outside the documented
  # allowlist in .gitleaks.toml fails the build.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: secret-scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euxo pipefail
          GITLEAKS_VERSION=8.30.1
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: gitleaks (secret scan, gate)
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks.sarif

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Load smoke (NON-BLOCKING): run the k6 smoke profile against a self-contained,
  # in-memory watertwin-api (auth disabled) to catch gross ingest/read-path
  # perf or breakage regressions. Non-blocking initially (continue-on-error) so
  # it surfaces regressions without gating merges yet.
  # ---------------------------------------------------------------------------
  load-smoke:
    name: load-smoke (k6, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API runtime
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install -r services/watertwin-api/requirements.txt

      - name: Install k6
        run: |
          set -euxo pipefail
          K6_VERSION=0.54.0
          curl -sSL -o /tmp/k6.tar.gz \
            "https://github.com/grafana/k6/releases/download/v${K6_VERSION}/k6-v${K6_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/k6.tar.gz -C /tmp
          sudo install "/tmp/k6-v${K6_VERSION}-linux-amd64/k6" /usr/local/bin/k6
          k6 version

      - name: Run k6 smoke profile (ingest + read paths)
        env:
          LOAD_PROFILE: smoke
        run: tests/load/run_smoke.sh
